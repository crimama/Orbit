appId: app.orbit.desktop
productName: Orbit
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
directories:
  app: dist-electron
  output: dist-packaged
files:
  - "**/*"
  - "!node_modules/**"
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  target:
    - target: dir
      arch:
        - arm64
asar: true
npmRebuild: false
